name: Update FIFA Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Fetch FIFA data
        run: node scripts/fifa-fetch.mjs --apply
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push if match data changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Only commit if something beyond generatedAt changed
          REAL_DIFF=$( { git diff data/live-updates.json; git diff data/squads.json; } | grep '^[+-]' | grep -v '^---' | grep -v '^+++' | grep -v '"generatedAt"' || true)
          if [ -n "$REAL_DIFF" ]; then
            git add data/live-updates.json data/squads.json
            git commit -m "data: update live match data"
            git push origin HEAD:main || echo "Push skipped — remote ahead, next run will retry"
          fi
